services:
  redis:
    image: redis:7-alpine
    container_name: lip_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: lip_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: lip_user
      POSTGRES_PASSWORD: lip_password
      POSTGRES_DB: lip_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data: